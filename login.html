<!DOCTYPE html>
<html>
<head>
<title>Login - Maison Café</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        font-family: Arial, sans-serif;
    }
    h2 {
        font-family: 'Georgia', serif;
        font-size: 28px;
        text-transform: uppercase;
        display: flex;
        justify-content: center;
        color: #8B4513;
        margin-bottom: 20px;
    }
    form {
        display: flex;
        flex-direction: column;
        width: 350px;
        border: 2px solid #D2B48C;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        justify-content: center;
        margin: 0 auto;
        background: white;
    }
    label {
        font-family: Arial, sans-serif;
        font-size: 14px;
        margin-bottom: 5px;
        color: #555;
        font-weight: bold;
    } 
    input {
        padding: 12px;
        border: 1px solid #D2B48C;
        border-radius: 5px;
        font-size: 16px;
        margin-bottom: 15px;
    }
    button {
        margin-top: 20px;
        padding: 12px;
        background: linear-gradient(45deg, #D2B48C, #8B4513);
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: all 0.3s;
    }
    button:hover {
        background: linear-gradient(45deg, #8B4513, #D2B48C);
        transform: translateY(-2px);
    }
    #msg {
        text-align: center;
        margin-top: 15px;
        font-weight: bold;
        color: #8B4513;
    }
</style>
</head>
<body>
    <form id="loginForm">
        <h2>Login</h2>
        
        <label>Usuário:</label>
        <input type="text" id="usuario" required>
        
        <label>Senha:</label>
        <input type="password" id="senha" required>
        
        <button id="entrarButton" type="submit">Entrar</button>
    </form>
    
    <p id="msg"></p>
    
    <script>
        document.getElementById("entrarButton").addEventListener("click", function(e){
            e.preventDefault();
            window.location.href = "loja.html";
        });

        document.getElementById("loginForm").addEventListener("submit", function(e){
            e.preventDefault();
            
            fetch("http://localhost:5000/login",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    usuario:document.getElementById("usuario").value,
                    senha:document.getElementById("senha").value
                })
            })
            .then(res=>res.json())
            .then(data=>{
                document.getElementById("msg").innerText=data.message;
            })
        })
    </script>
</body>
</html>
