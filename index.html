<!DOCTYPE html>
<html>
<head>
<title>Login - Maison Café</title>
<style>
    :root {
        --primary-dark: #6F4E37;
        --primary-light: #D4A574;
        --primary-accent: #A0826D;
        --bg-gradient-1: #f8fafc;
        --bg-gradient-2: #e2e8f0;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --text-light: #94a3b8;
        --border-color: #cbd5e1;
        --success-bg: #ecfdf5;
        --success-text: #065f46;
        --error-bg: #fef2f2;
        --error-text: #7f1d1d;
        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.15);
        --shadow-xl: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

        :root.dark-mode {
            --bg-gradient-1: #1a1a1a;
            --bg-gradient-2: #2d2d2d;
            --text-primary: #f0f0f0;
            --text-secondary: #a8a8a8;
            --text-light: #808080;
            --border-color: #404040;
            --success-bg: #1a3a1a;
            --success-text: #90ee90;
            --error-bg: #3a1a1a;
            --error-text: #ff9999;
        }

        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.6;
        }

        .container {
        max-width: 420px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: var(--shadow-xl);
        overflow: hidden;
        animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        background: linear-gradient(90deg, var(--primary-dark) 0%, var(--primary-accent) 100%);
        gap: 1px;
        padding: 1px;
        background-clip: padding-box;
    }

    .tab-btn {
        flex: 1;
        padding: 16px 14px;
        border: none;
        background: transparent;
        color: white;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    .tab-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.1);
        transition: left 0.3s ease;
        z-index: -1;
    }

    .tab-btn:hover::before {
        left: 0;
    }

    .tab-btn.active {
        background: rgba(255, 255, 255, 0.15);
        border-bottom: 3px solid white;
        box-shadow: inset 0 -3px 0 rgba(255, 255, 255, 0.2);
    }

    .tab-btn:focus {
        outline: 2px solid rgba(255, 255, 255, 0.4);
        outline-offset: -2px;
    }

    .tab-content {
        padding: 40px 30px;
        display: none;
        animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    .tab-content.active {
        display: block;
    }

    h2 {
        font-family: 'Segoe UI', 'Roboto', sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--primary-dark);
        text-align: center;
        margin: 0 0 30px 0;
        letter-spacing: -0.5px;
    }

    label {
        font-size: 13px;
        margin-bottom: 8px;
        color: var(--text-primary);
        font-weight: 600;
        display: block;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid var(--border-color);
        border-radius: 8px;
        font-size: 15px;
        margin-bottom: 18px;
        background: #fafbfc;
        color: var(--text-primary);
        transition: all 0.2s ease;
        font-family: inherit;
    }

    input::placeholder {
        color: var(--text-light);
    }

    input:hover {
        border-color: var(--primary-light);
        background: #ffffff;
    }

    input:focus {
        outline: none;
        border-color: var(--primary-dark);
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(111, 78, 55, 0.1);
    }

    input:disabled {
        background: #f1f5f9;
        color: var(--text-light);
        cursor: not-allowed;
    }

    button {
        width: 100%;
        margin-top: 10px;
        padding: 13px 16px;
        background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-accent) 100%);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.3px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        box-shadow: var(--shadow-md);
    }

    button::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
        pointer-events: none;
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
    }

    button:hover::before {
        width: 300px;
        height: 300px;
    }

    button:active {
        transform: translateY(0);
    }

    button:focus {
        outline: 2px solid rgba(111, 78, 55, 0.5);
        outline-offset: 2px;
    }

    button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none !important;
    }

    .msg {
        text-align: center;
        margin-top: 20px;
        font-weight: 600;
        padding: 14px 16px;
        border-radius: 8px;
        display: none;
        font-size: 14px;
        border: 1.5px solid;
        animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .msg.show {
        display: block;
    }

    .msg.success {
        background: var(--success-bg);
        color: var(--success-text);
        border-color: #86efac;
    }

    .msg.error {
        background: var(--error-bg);
        color: var(--error-text);
        border-color: #fca5a5;
    }

    @media (max-width: 480px) {
        .container {
            max-width: 100%;
            border-radius: 12px;
        }

        .tab-content {
            padding: 30px 20px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 25px;
        }

        label {
            font-size: 12px;
        }

        input {
            padding: 11px 12px;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 14px;
            font-size: 14px;
        }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="mudarAba('admin')">👨‍💼 Admin</button>
            <button class="tab-btn" onclick="mudarAba('usuario')">👤 Usuário</button>
            <button class="tab-btn" onclick="mudarAba('registro')">📝 Registrar</button>
        </div>


        <!-- ABA ADMIN -->
        <div id="admin" class="tab-content active">
            <h2>Login Admin</h2>
            <form id="adminForm" onsubmit="loginAdmin(event)">
                <label>Usuário:</label>
                <input type="text" id="admin_user" required value="admin">
                
                <label>Senha:</label>
                <input type="password" id="admin_pass" required value="senha123">
                
                <button type="submit">Entrar como Admin</button>
            </form>
            <p id="msg_admin" class="msg"></p>
        </div>


        <!-- ABA USUÁRIO -->
        <div id="usuario" class="tab-content">
            <h2>Login Usuário</h2>
            <form id="usuarioForm" onsubmit="loginUsuario(event)">
                <label>Usuário:</label>
                <input type="text" id="user_user" required placeholder="Digite seu usuário">
                
                <label>Senha:</label>
                <input type="password" id="user_pass" required placeholder="Digite sua senha">
                
                <button type="submit">Entrar como Usuário</button>
            </form>
            <p id="msg_usuario" class="msg"></p>
        </div>


        <!-- ABA REGISTRO -->
        <div id="registro" class="tab-content">
            <h2>Criar Conta</h2>
            <form id="registroForm" onsubmit="registrarUsuario(event)">
                <label>Usuário:</label>
                <input type="text" id="reg_user" required placeholder="Escolha um usuário único">
                
                <label>Senha:</label>
                <input type="password" id="reg_pass" required placeholder="Digite uma senha">
                
                <label>Confirmar Senha:</label>
                <input type="password" id="reg_pass_confirm" required placeholder="Confirme a senha">
                
                <button type="submit">Registrar</button>
            </form>
            <p id="msg_registro" class="msg"></p>
        </div>
    </div>
  
<script>
    // ⚠️ CONFIGURAÇÃO IMPORTANTE: URLs da API
    // GitHub Pages: https://joaovictormaccagnan.github.io/Geral/
    // Desenvolvimento local: http://127.0.0.1:8000
    // Para produção: mude a URL da API para seu servidor hospedado (Heroku, Render, etc)
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://127.0.0.1:8000'
        : 'https://seu-servidor-api.com'; // ← MUDE PARA SUA API HOSPEDADA

    function mudarAba(aba) {
        // Esconde todos os tabs
        document.getElementById('admin').classList.remove('active');
        document.getElementById('usuario').classList.remove('active');
        document.getElementById('registro').classList.remove('active');
        
        // Remove active de todos os botões
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        // Mostra a aba selecionada
        document.getElementById(aba).classList.add('active');
        event.target.classList.add('active');
    }


    function mostrarMensagem(elementoId, mensagem, sucesso) {
        const elemento = document.getElementById(elementoId);
        elemento.innerText = mensagem;
        elemento.classList.add('show');
        elemento.classList.toggle('success', sucesso);
        elemento.classList.toggle('error', !sucesso);
    }


    async function loginAdmin(e) {
        e.preventDefault();
        const usuario = document.getElementById('admin_user').value;
        const senha = document.getElementById('admin_pass').value;
        
        try {
            const res = await fetch(`${API_URL}/login_admin`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `usuario=${encodeURIComponent(usuario)}&senha=${encodeURIComponent(senha)}`
            });
            
            const data = await res.json();
            
            if (data.sucesso) {
                mostrarMensagem('msg_admin', data.message, true);
                sessionStorage.setItem('usuarioLogado', usuario);
                sessionStorage.setItem('tipoLogin', 'admin');
                setTimeout(() => window.location.href = 'admin.html', 1000);
            } else {
                mostrarMensagem('msg_admin', data.message, false);
            }
        } catch (err) {
            mostrarMensagem('msg_admin', '❌ Erro de conexão! Verifique se a API está rodando.', false);
        }
    }


    async function loginUsuario(e) {
        e.preventDefault();
        const usuario = document.getElementById('user_user').value;
        const senha = document.getElementById('user_pass').value;
        
        try {
            const res = await fetch(`${API_URL}/login_usuario`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `usuario=${encodeURIComponent(usuario)}&senha=${encodeURIComponent(senha)}`
            });
            
            const data = await res.json();
            
            if (data.sucesso) {
                mostrarMensagem('msg_usuario', data.message, true);
                sessionStorage.setItem('usuarioLogado', usuario);
                sessionStorage.setItem('tipoLogin', 'usuario');
                setTimeout(() => window.location.href = 'loja.html', 1000);
            } else {
                mostrarMensagem('msg_usuario', data.message, false);
            }
        } catch (err) {
            mostrarMensagem('msg_usuario', '❌ Erro de conexão! Verifique se a API está rodando.', false);
        }
    }


    async function registrarUsuario(e) {
        e.preventDefault();
        const usuario = document.getElementById('reg_user').value;
        const senha = document.getElementById('reg_pass').value;
        const senhaConfirm = document.getElementById('reg_pass_confirm').value;


        // Validar se as senhas coincidem
        if (senha !== senhaConfirm) {
            mostrarMensagem('msg_registro', '❌ As senhas não coincidem!', false);
            return;
        }


        // Validar comprimento da senha
        if (senha.length < 4) {
            mostrarMensagem('msg_registro', '❌ A senha deve ter pelo menos 4 caracteres!', false);
            return;
        }


        try {
            const res = await fetch(`${API_URL}/registro`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `usuario=${encodeURIComponent(usuario)}&senha=${encodeURIComponent(senha)}`
            });
            
            const data = await res.json();
            
            if (data.sucesso) {
                mostrarMensagem('msg_registro', data.message, true);
                // Limpar formulário
                document.getElementById('registroForm').reset();
                // Redirecionar para login após 2 segundos
                setTimeout(() => {
                    mudarAba('usuario');
                }, 2000);
            } else {
                mostrarMensagem('msg_registro', data.message, false);
            }
        } catch (err) {
            mostrarMensagem('msg_registro', '❌ Erro de conexão! Verifique se a API está rodando.', false);
        }
    }

    // ========== TEMA CLARO/ESCURO ==========
    function toggleTheme() {
        const html = document.documentElement;
        const isDarkMode = html.classList.contains('dark-mode');
        
        if (isDarkMode) {
            html.classList.remove('dark-mode');
            localStorage.setItem('theme', 'light');
            document.getElementById('themeToggle').textContent = '🌙 Escuro';
        } else {
            html.classList.add('dark-mode');
            localStorage.setItem('theme', 'dark');
            document.getElementById('themeToggle').textContent = '☀️ Claro';
        }
    }

    function initializeTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        const html = document.documentElement;
        
        if (savedTheme === 'dark') {
            html.classList.add('dark-mode');
            document.getElementById('themeToggle').textContent = '☀️ Claro';
        } else {
            html.classList.remove('dark-mode');
            document.getElementById('themeToggle').textContent = '🌙 Escuro';
        }
    }

    initializeTheme();
</script>

</body>
</html>
